<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MovieGraph.AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app-layout">

  <!-- ─── Left Panel: Search + Graph + Cypher ─────────────── -->
  <div class="panel-left">

    <section id="search-section">
      <textarea id="question-input" rows="3" placeholder="What are the highest rated movies from 2016?"></textarea>
      <button id="ask-btn">Ask</button>
      <div id="examples"></div>
    </section>

    <!-- Graph view container (collapsible) -->
    <details id="graph-section" open>
      <summary>Graph</summary>
      <div id="graph-container">
        <div id="graph-legend"></div>
        <div id="graph-controls">
          <button class="graph-ctrl-btn" id="btn-zoom-in"  title="Zoom in">+</button>
          <button class="graph-ctrl-btn" id="btn-zoom-out" title="Zoom out">−</button>
          <button class="graph-ctrl-btn" id="btn-zoom-fit" title="Fit" style="font-size:.7rem;font-weight:700">FIT</button>
        </div>
      </div>
    </details>

    <!-- Cypher query display -->
    <details id="cypher-section" open>
      <summary>Cypher query</summary>
      <pre id="cypher-code"></pre>
    </details>

  </div>

  <!-- ─── Right Panel: Header + Results ───────────────────── -->
  <div class="panel-right">

    <header>
      <div class="logo-row">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="6" y="14" width="40" height="24" rx="3" fill="#111"/>
          <rect x="9"  y="17" width="5" height="4" rx="1" fill="#f8f8f6"/>
          <rect x="9"  y="24" width="5" height="4" rx="1" fill="#f8f8f6"/>
          <rect x="9"  y="31" width="5" height="4" rx="1" fill="#f8f8f6"/>
          <rect x="38" y="17" width="5" height="4" rx="1" fill="#f8f8f6"/>
          <rect x="38" y="24" width="5" height="4" rx="1" fill="#f8f8f6"/>
          <rect x="38" y="31" width="5" height="4" rx="1" fill="#f8f8f6"/>
          <circle cx="26" cy="26" r="4.5" fill="#f5c518"/>
          <circle cx="19" cy="21" r="3"   fill="#f8f8f6" opacity="0.8"/>
          <circle cx="33" cy="21" r="3"   fill="#f8f8f6" opacity="0.8"/>
          <line x1="26" y1="26" x2="19" y2="21" stroke="#f5c518" stroke-width="1.5" opacity="0.8"/>
          <line x1="26" y1="26" x2="33" y2="21" stroke="#f5c518" stroke-width="1.5" opacity="0.8"/>
          <line x1="19" y1="21" x2="33" y2="21" stroke="#f8f8f6" stroke-width="1.2" opacity="0.4"/>
        </svg>
        <h1>MovieGraph.AI</h1>
      </div>
      <p>Ask anything about movies, cast, directors, and recommendations — powered by a graph database.</p>
    </header>

    <section id="results-section" style="display:none">

      <div id="loading" style="display:none">
        <div class="spinner-border" role="status"></div>
        <p>Analyzing your question…</p>
      </div>

      <div id="answer-text"></div>
      <div id="query-tags"></div>

      <hr id="results-divider" class="results-divider" style="display:none" />

      <!-- Card view containers -->
      <div id="movie-grid"    style="display:none"></div>
      <div id="person-grid"   style="display:none"></div>
      <div id="movie-detail"  class="detail-card" style="display:none"></div>
      <div id="person-detail" class="detail-card" style="display:none"></div>

    </section>

  </div>

</div>

  <!-- D3 v7 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
