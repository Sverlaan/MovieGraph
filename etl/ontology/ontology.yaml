nodes:
  Movie:
    description: "Represents a movie with its metadata, ratings, media links, and performance metrics."
    keys: [slug, imdb_id, tmdb_id]
    properties:
      slug:
        type: string
        description: "Unique identifier for the movie in the local database."
      title:
        type: string
        description: "The official title of the movie."
      release_date:
        type: date
        description: "The release date of the movie."
      release_year:
        type: integer
        description: "The release year extracted from the release date."
      rating:
        type: float
        description: "Average user rating of the movie."
      watchers:
        type: integer
        description: "Number of users watching or tracking the movie."
      runtime:
        type: integer
        description: "Duration of the movie in minutes."
      budget:
        type: integer
        description: "Production budget in USD."
      revenue:
        type: integer
        description: "Revenue generated by the movie in USD."
      plot:
        type: string
        description: "Plot summary of the movie."
      tagline:
        type: string
        description: "Short tagline associated with the movie."
      poster:
        type: string
        description: "URL to the poster image."
      banner:
        type: string
        description: "URL to the banner or backdrop image."
      trailer:
        type: string
        description: "URL to the official trailer."
      original_language:
        type: string
        description: "Original spoken language code of the movie."
      popularity:
        type: float
        description: "Popularity score from the external source."
      status:
        type: string
        description: "Current status of the movie (Released, Post Production, etc.)."
      homepage:
        type: string
        description: "Official homepage URL for the movie."
      letterboxd_url:
        type: string
        description: "URL to the movie on Letterboxd."
      imdb_url:
        type: string
        description: "URL to the movie on IMDb."
      tmdb_url:
        type: string
        description: "URL to the movie on TMDb."
      letterboxd_id:
        type: integer
        description: "Unique Letterboxd ID."
      imdb_id:
        type: string
        description: "IMDb identifier."
      tmdb_id:
        type: integer
        description: "TMDb identifier."

  Person:
    description: "Represents a person involved in movies, such as actors, directors, or crew."
    keys: [name, tmdb_id, imdb_id]
    properties:
      name:
        type: string
        description: "Full name of the person."
      biography:
        type: string
        description: "Brief biography of the person."
      birthday:
        type: date
        description: "Birth date of the person."
      deathday:
        type: date
        description: "Death date if applicable."
      place_of_birth:
        type: string
        description: "City/country of birth."
      picture:
        type: string
        description: "URL to a picture of the person."
      popularity:
        type: float
        description: "Popularity score from external sources."
      gender:
        type: integer
        description: "Gender code (1=female, 2=male, 0/unknown)."
      known_for_department:
        type: string
        description: "Main professional department (Acting, Directing, etc.)."
      homepage:
        type: string
        description: "Official homepage URL."
      tmdb_id:
        type: integer
        description: "TMDb identifier."
      imdb_id:
        type: string
        description: "IMDb identifier."

  User:
    description: "Represents a user of the platform."
    keys: [username]
    properties:
      username:
        type: string
        description: "Unique username of the user."
      display_name:
        type: string
        description: "Display name of the user."
      avatar:
        type: string
        description: "URL to the user's avatar."
      url:
        type: string
        description: "URL to the user's profile."

  Genre:
    description: "Represents a genre category for movies."
    keys: [id]
    properties:
      id:
        type: integer
        description: "Unique genre identifier."
      name:
        type: string
        description: "Name of the genre."

  Theme:
    description: "High-level theme associated with a movie."
    keys: [name]
    properties:
      name:
        type: string
        description: "Name of the theme."

  MiniTheme:
    description: "Finer-grained theme associated with a movie."
    keys: [name]
    properties:
      name:
        type: string
        description: "Name of the mini-theme."

  Collection:
    description: "Represents a movie collection (series or franchise)."
    keys: [id]
    properties:
      id:
        type: integer
        description: "Collection identifier."
      name:
        type: string
        description: "Name of the collection."
      poster:
        type: string
        description: "Poster image URL."
      backdrop:
        type: string
        description: "Backdrop image URL."

  Studio:
    description: "Represents a production studio."
    keys: [id]
    properties:
      id:
        type: integer
        description: "Studio identifier."
      name:
        type: string
        description: "Studio name."
      logo_path:
        type: string
        description: "URL to the studio logo."
      origin_country:
        type: string
        description: "Country of origin."

  Country:
    description: "Represents a country."
    keys: [iso_3166_1]
    properties:
      iso_3166_1:
        type: string
        description: "ISO 3166-1 alpha-2 country code."
      name:
        type: string
        description: "Official country name."

  Language:
    description: "Represents a language spoken in movies."
    keys: [iso_639_1]
    properties:
      iso_639_1:
        type: string
        description: "ISO 639-1 language code."
      name:
        type: string
        description: "Native name of the language."
      english_name:
        type: string
        description: "English name of the language."

  Keyword:
    description: "Represents a keyword/tag associated with a movie."
    keys: [id]
    properties:
      id:
        type: integer
        description: "Keyword identifier."
      name:
        type: string
        description: "Keyword text."

  OscarNom:
    description: "Represents an Oscar nomination for a movie or person."
    keys: [id]
    properties:
      id:
        type: string
        description: "Unique nomination ID."
      ceremony:
        type: integer
        description: "Number of the ceremony."
      year:
        type: integer
        description: "Year of the ceremony."
      canonical_category:
        type: string
        description: "Standardized category name."
      category:
        type: string
        description: "Original category name."
      winner:
        type: boolean
        description: "True if the nomination won."
      detail:
        type: string
        description: "Additional details about the nomination."
      note:
        type: string
        description: "Any relevant notes."
      citation:
        type: string
        description: "Reference for verification."

edges:
  ACTED_IN:
    description: "Indicates that a person acted in a movie."
    source: Person
    target: Movie
    source_key: tmdb_id
    target_key: slug
    properties:
      character:
        type: string
        description: "Name of the character played."
      billing_order:
        type: integer
        description: "Order of billing in the credits."

  WORKED_ON:
    description: "Indicates that a person worked on a movie in a specific role."
    source: Person
    target: Movie
    source_key: tmdb_id
    target_key: slug
    properties:
      job:
        type: string
        description: "Job title (e.g., Director, Producer)."
      department:
        type: string
        description: "Department name (e.g., Directing, Production)."

  RATED:
    description: "Indicates that a user rated a movie."
    source: User
    target: Movie
    source_key: username
    target_key: slug
    properties:
      rating:
        type: float
        description: "Numerical rating given by the user."
      liked:
        type: boolean
        description: "True if the user liked the movie."

  PREDICTED:
    description: "Indicates a predicted rating for a movie for a user, used for giving recommendations."
    source: User
    target: Movie
    source_key: username
    target_key: slug
    properties:
      score:
        type: float
        description: "Predicted rating for the movie for this user."

  WATCHLISTED:
    description: "Indicates that a user added a movie to their watchlist."
    source: User
    target: Movie
    source_key: username
    target_key: slug
    properties: {}

  BLACKLISTED:
    description: "Indicates that a user blacklisted a movie."
    source: User
    target: Movie
    source_key: username
    target_key: slug
    properties: {}

  HAS_GENRE:
    description: "Links a movie to one of its genres."
    source: Movie
    target: Genre
    source_key: tmdb_id
    target_key: id
    properties: {}

  HAS_THEME:
    description: "Links a movie to a theme."
    source: Movie
    target: Theme
    source_key: tmdb_id
    target_key: name
    properties: {}

  HAS_MINI_THEME:
    description: "Links a movie to a mini-theme."
    source: Movie
    target: MiniTheme
    source_key: tmdb_id
    target_key: name
    properties: {}

  BELONGS_TO_COLLECTION:
    description: "Indicates that a movie belongs to a collection."
    source: Movie
    target: Collection
    source_key: tmdb_id
    target_key: id
    properties: {}

  PRODUCED_BY:
    description: "Indicates the studio that produced a movie."
    source: Movie
    target: Studio
    source_key: tmdb_id
    target_key: id
    properties: {}

  PRODUCED_IN:
    description: "Indicates the country where the movie was produced."
    source: Movie
    target: Country
    source_key: tmdb_id
    target_key: iso_3166_1
    properties: {}

  SPOKEN_IN:
    description: "Indicates the languages spoken in a movie."
    source: Movie
    target: Language
    source_key: tmdb_id
    target_key: iso_639_1
    properties: {}

  HAS_KEYWORD:
    description: "Links a movie to a keyword."
    source: Movie
    target: Keyword
    source_key: tmdb_id
    target_key: id
    properties: {}

  NOMINATED_MOVIE:
    description: "Indicates that a movie was nominated for an Oscar."
    source: OscarNom
    target: Movie
    source_key: id
    target_key: imdb_id
    properties: {}

  NOMINATED_PERSON:
    description: "Indicates that a person was nominated for an Oscar."
    source: OscarNom
    target: Person
    source_key: id
    target_key: imdb_id
    properties: {}

  LOGGED:
    description: "Indicates a diary log entry from a user for a movie."
    source: User
    target: Movie
    source_key: username
    target_key: slug
    merge_key: entry_id
    properties:
      entry_id:
        type: string
        description: "Unique diary entry identifier."
      name:
        type: string
        description: "Movie name at time of logging."
      rewatched:
        type: boolean
        description: "True if this was a rewatch."
      rating:
        type: float
        description: "Rating given in this diary entry."
      liked:
        type: boolean
        description: "True if the user liked the movie."
      reviewed:
        type: boolean
        description: "True if the user wrote a review."
      date:
        type: string
        description: "Date of the diary entry."
      page_url:
        type: string
        description: "URL to the diary page."
      page_no:
        type: integer
        description: "Diary page number."