name: MovieGraph ETL Pipeline

on:
  schedule:
    - cron: "0 1 * * *" # Every day at 1:00 AM UTC
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:

  # =================================
  # ETL PIPELINE (SINGLE JOB)
  # =================================
  etl:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      NEO4J_URI_AURA: ${{ secrets.NEO4J_URI_AURA }}
      NEO4J_USERNAME_AURA: ${{ secrets.NEO4J_USERNAME_AURA }}
      NEO4J_PASSWORD_AURA: ${{ secrets.NEO4J_PASSWORD_AURA }}
      NEO4J_DATABASE_AURA: ${{ secrets.NEO4J_DATABASE_AURA }}

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # Python setup
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.2"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . --config-settings editable_mode=compat

      # -----------------------------
      # Credentials
      # -----------------------------
      - name: Create credentials.env
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> credentials.env
          echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" >> credentials.env
          echo "NEO4J_URI_AURA=${{ secrets.NEO4J_URI_AURA }}" >> credentials.env
          echo "NEO4J_USERNAME_AURA=${{ secrets.NEO4J_USERNAME_AURA }}" >> credentials.env
          echo "NEO4J_PASSWORD_AURA=${{ secrets.NEO4J_PASSWORD_AURA }}" >> credentials.env
          echo "NEO4J_DATABASE_AURA=${{ secrets.NEO4J_DATABASE_AURA }}" >> credentials.env

      # -----------------------------
      # Warm up Letterboxd (important)
      # -----------------------------
      - name: Warm up Letterboxd
        run: |
          curl \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36" \
            -L \
            https://letterboxd.com/ > /dev/null
          sleep 2

      # -----------------------------
      # Update sources
      # -----------------------------
      - name: Run update-sources
        run: update-sources

      # -----------------------------
      # Commit updated sources (optional but preserved)
      # -----------------------------
      - name: Set git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit updated sources if changed
        run: |
          if ! git diff --quiet --exit-code etl/data/sources/; then
            git add etl/data/sources/
            git commit -m "Update sources via CI"
            git push
          else
            echo "No changes to sources. Skipping commit."
          fi

      # -----------------------------
      # Build graph (uses updated sources)
      # -----------------------------
      - name: Run build-graph
        run: build-graph

    #   # -----------------------------
    #   # Upload sources as artifact
    #   # -----------------------------
    #   - name: Upload sources artifact
    #     uses: actions/upload-artifact@v4
    #     with:
    #       name: moviegraph-sources
    #       path: etl/data/sources/
