<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MovieGraph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=13" />
</head>
<body>

  <!-- Top-left logo -->
  <header class="site-header">
    <a class="logo-link" href="/">
      <div class="logo-mark">
        <span>MOVIE</span>
        <span>GRAPH</span>
      </div>
    </a>
  </header>

  <!-- Main content -->
  <main class="main-area">

    <!-- Search -->
    <section class="search-section">
      <input
        id="question-input"
        type="text"
        placeholder="What do you want to find?"
        autocomplete="off"
        spellcheck="false"
      />
      <div id="examples" class="examples"></div>
    </section>

    <!-- View toggle (shown after first response) -->
    <div id="view-toggle" class="view-toggle" style="display:none">
      <button id="btn-output" class="toggle-btn active">Output</button>
      <span class="toggle-sep">/</span>
      <button id="btn-graph" class="toggle-btn">Graph</button>
    </div>

    <!-- Output view -->
    <section id="output-view" class="output-view" style="display:none">

      <div id="loading" class="loading" style="display:none">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <p>Analyzing</p>
      </div>

      <div id="answer-text" class="answer-text"></div>
      <div id="query-tags" class="query-tags"></div>

      <hr id="results-divider" class="results-divider" style="display:none" />

      <div id="movie-grid"    style="display:none"></div>
      <div id="person-grid"   style="display:none"></div>
      <div id="movie-detail"  class="movie-detail-card" style="display:none"></div>
      <div id="person-detail" class="person-detail-card" style="display:none"></div>

    </section>

    <!-- Graph view -->
    <section id="graph-view" class="graph-view" style="display:none">
      <div id="graph-container">
        <div id="graph-legend"></div>
        <div id="graph-controls">
          <button class="graph-ctrl-btn" id="btn-zoom-in">+</button>
          <button class="graph-ctrl-btn" id="btn-zoom-out">−</button>
          <button class="graph-ctrl-btn" id="btn-zoom-fit">FIT</button>
        </div>
      </div>
      <div class="cypher-section">
        <div class="cypher-label">Cypher Query</div>
        <pre id="cypher-code" class="cypher-code"></pre>
      </div>
    </section>

  </main>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="app.js?v=13"></script>
</body>
</html>
