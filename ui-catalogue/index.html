<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MovieGraph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=25" />
</head>
<body>

  <!-- Top-left logo -->
  <header class="site-header">
    <a class="logo-link" href="/">
      <div class="logo-mark">
        <span>MOVIE</span>
        <span>GRAPH</span>
      </div>
    </a>
  </header>

  <!-- Main content -->
  <main class="main-area">

    <!-- Search -->
    <section class="search-section">
      <input
        id="question-input"
        type="text"
        placeholder="What do you want to find?"
        autocomplete="off"
        spellcheck="false"
      />
      <div id="examples" class="examples"></div>
    </section>

    <!-- Output view -->
    <section id="output-view" class="output-view" style="display:none">

      <div id="loading" class="loading" style="display:none">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <p>Analyzing</p>
      </div>

      <div id="answer-text" class="answer-text"></div>
      <hr id="results-divider" class="results-divider" style="display:none" />

      <div id="movie-grid"    style="display:none"></div>
      <div id="person-grid"   style="display:none"></div>
      <div id="movie-detail"  class="movie-detail-card" style="display:none"></div>
      <div id="person-detail" class="person-detail-card" style="display:none"></div>

    </section>

  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <p class="site-footer-copy">© 2026 MovieGraph. All rights reserved.</p>
      <p class="site-footer-ack">
        Movie data sourced from <a href="https://letterboxd.com" target="_blank" rel="noopener">Letterboxd</a>
        and the <a href="https://www.themoviedb.org" target="_blank" rel="noopener">TMDB API</a>.
        This product uses the TMDB API but is not endorsed or certified by TMDB.
      </p>
    </div>
  </footer>

  <script src="app.js?v=25"></script>
</body>
</html>
